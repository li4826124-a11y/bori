<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소설 내지 페이지</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f1faee">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
  font-family: "Nanum Gothic", sans-serif;
  background: #fdf6e3;
  color: #333;
  padding: 20px;
  max-width: 600px;
  margin: 0 auto;
}
h1 {
  text-align: center;
  margin-bottom: 20px;
}
textarea {
  width: 100%;
  height: 300px;
  font-size: 16px;
  padding: 10px;
  margin-bottom: 10px;
}
button {
  display: block;
  margin: 0 auto;
  padding: 10px 20px;
  font-size: 16px;
  background-color: #2a9d8f;
  color: #fff;
  border: none;
  border-radius: 6px;
}
#status { text-align: center; margin-top: 10px; color: green; }
</style>
</head>
<body>

<h1>소설 내지 페이지</h1>
<textarea id="story" placeholder="여기에 소설 작성..."></textarea>
<button onclick="saveStory()">저장하기</button>
<p id="status"></p>

<script>
// 저장 기능
function saveStory() {
  const text = document.getElementById('story').value;
  if(!text) { alert("내용이 없어요!"); return; }
  localStorage.setItem('myStory', text);
  document.getElementById('status').innerText = "저장 완료 ✅";
}

// 불러오기
window.onload = () => {
  const saved = localStorage.getItem('myStory');
  if(saved) document.getElementById('story').value = saved;
}

// PWA Service Worker 등록
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js')
  .then(()=>console.log("Service Worker 등록 완료"))
  .catch(e=>console.log("Service Worker 실패", e));
}
</script>

</body>
</html>
